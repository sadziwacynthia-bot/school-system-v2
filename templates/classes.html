{% extends "base.html" %}
{% block title %}Classes{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Classes</h1>
    <p>Select a class to view its students.</p>
</div>

<div class="class-grid">
    {% for class_name in class_options %}
        <a href="{{ url_for('class_students', class_name=class_name) }}" class="class-btn">
            <span class="class-name">{{ class_name }}</span>
            <span class="class-action">Open Class</span>
        </a>
    {% endfor %}
</div>

<style>
.page-header {
    margin-bottom: 24px;
}

.page-header h1 {
    margin: 0;
    color: #2563eb;
    font-size: 30px;
}

.page-header p {
    margin-top: 8px;
    color: #6b7280;
    font-size: 15px;
}

.class-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 18px;
}

.class-btn {
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: linear-gradient(135deg, #2563eb, #1e40af);
    color: white;
    text-decoration: none;
    border-radius: 16px;
    padding: 22px 20px;
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.10);
    transition: 0.2s ease;
}

.class-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(37, 99, 235, 0.20);
}

.class-name {
    font-size: 19px;
    font-weight: 700;
    line-height: 1.3;
}

.class-action {
    font-size: 13px;
    color: rgba(255, 255, 255, 0.85);
    font-weight: 600;
}
</style>
{% endblock %}
