{% extends "base.html" %}
{% block title %}Add School Admin{% endblock %}

{% block content %}
<div style="max-width:700px; background:white; padding:24px; border-radius:16px; box-shadow:0 4px 14px rgba(0,0,0,0.08);">
    <h1 style="color:#2563eb;">Add School Admin</h1>

    <form method="POST">
        <div style="margin-bottom:14px;">
            <label>School</label>
            <select name="school_id" required style="width:100%; padding:12px; border:1px solid #d1d5db; border-radius:10px;">
                <option value="">Select school</option>
                {% for school in schools %}
                    <option value="{{ school.id }}">{{ school.school_name }}</option>
                {% endfor %}
            </select>
        </div>

        <div style="margin-bottom:14px;">
            <label>Full Name</label>
            <input type="text" name="full_name" required style="width:100%; padding:12px; border:1px solid #d1d5db; border-radius:10px;">
        </div>

        <div style="margin-bottom:14px;">
            <label>Username</label>
            <input type="text" name="username" required style="width:100%; padding:12px; border:1px solid #d1d5db; border-radius:10px;">
        </div>

        <div style="margin-bottom:14px;">
            <label>Password</label>
            <input type="password" name="password" required style="width:100%; padding:12px; border:1px solid #d1d5db; border-radius:10px;">
        </div>

        <button type="submit" style="background:#2563eb; color:white; border:none; padding:12px 18px; border-radius:10px; font-weight:600;">
            Create School Admin
        </button>
    </form>
</div>
{% endblock %}
