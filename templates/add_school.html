{% extends "base.html" %}
{% block title %}Add School{% endblock %}

{% block content %}
<div style="max-width:600px; background:white; padding:24px; border-radius:16px; box-shadow:0 4px 14px rgba(0,0,0,0.08);">
    <h1 style="color:#2563eb;">Add School</h1>

    <form method="POST">
        <div style="margin-bottom:14px;">
            <label>School Name</label>
            <input type="text" name="school_name" required style="width:100%; padding:12px; border:1px solid #d1d5db; border-radius:10px;">
        </div>

        <div style="margin-bottom:14px;">
            <label>School Code</label>
            <input type="text" name="school_code" required style="width:100%; padding:12px; border:1px solid #d1d5db; border-radius:10px;">
        </div>

        <button type="submit" style="background:#2563eb; color:white; border:none; padding:12px 18px; border-radius:10px; font-weight:600;">
            Save School
        </button>
    </form>
</div>
{% endblock %}
