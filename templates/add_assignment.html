{% extends "base.html" %}
{% block title %}Add Assignment{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Add Assignment</h1>
    <p>Create a new assignment for a class and subject.</p>
</div>

<div class="card-box">
    <form method="POST" class="form-grid">
        <div class="form-group">
            <label>Class</label>
            <select name="class_name" required>
                <option value="">Select class</option>
                {% for class_name in class_options %}
                    <option value="{{ class_name }}">{{ class_name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>Subject</label>
            <select name="subject" required>
                <option value="">Select subject</option>
                {% for subject in subjects %}
                    <option value="{{ subject }}">{{ subject }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group full-width">
            <label>Title</label>
            <input type="text" name="title" required>
        </div>

        <div class="form-group full-width">
            <label>Description</label>
            <textarea name="description" rows="5" required></textarea>
        </div>

        <div class="form-group">
            <label>Due Date</label>
            <input type="date" name="due_date" required>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-primary">Save Assignment</button>
            <a href="{{ url_for('assignments') }}" class="btn-secondary">Back</a>
        </div>
    </form>
</div>

<style>
.page-header {
    margin-bottom: 24px;
}
.page-header h1 {
    margin: 0;
    color: #2563eb;
    font-size: 30px;
}
.page-header p {
    margin-top: 8px;
    color: #6b7280;
}
.card-box {
    background: #ffffff;
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
}
.form-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 18px;
}
.full-width {
    grid-column: 1 / -1;
}
.form-group label {
    display: block;
    margin-bottom: 8px;
    font-weight: 600;
}
.form-group input,
.form-group select,
.form-group textarea {
    width: 100%;
    padding: 12px;
    border: 1px solid #d1d5db;
    border-radius: 10px;
    box-sizing: border-box;
}
.form-actions {
    grid-column: 1 / -1;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
}
.btn-primary,
.btn-secondary {
    display: inline-block;
    padding: 12px 18px;
    border-radius: 10px;
    text-decoration: none;
    font-weight: 600;
}
.btn-primary {
    background: #2563eb;
    color: white;
    border: none;
}
.btn-secondary {
    background: #e5e7eb;
    color: #111827;
}
@media (max-width: 700px) {
    .form-grid {
        grid-template-columns: 1fr;
    }
}
</style>
{% endblock %}
