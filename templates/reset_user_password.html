{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}
{% block page_heading %}Reset Password{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h2 class="page-title">Reset Password</h2>
        <p class="page-subtitle">Set a new password for {{ user.full_name }}</p>
    </div>
</div>

<div class="form-card">
    <form method="POST">
        <label>User</label>
        <input type="text" value="{{ user.full_name }} ({{ user.username }})" readonly>

        <label>New Password</label>
        <input type="password" name="new_password" required>

        <label>Confirm Password</label>
        <input type="password" name="confirm_password" required>

        <div class="action-group" style="margin-top: 18px;">
            <button type="submit" class="btn btn-primary">Reset Password</button>
            <a href="{{ url_for('users') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
