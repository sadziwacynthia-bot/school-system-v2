{% extends "base.html" %}
{% block title %}Set Password{% endblock %}

{% block content %}
<div class="card" style="max-width: 450px; margin: 30px auto;">
    <h1 class="page-title">Set Password</h1>
    <p class="page-subtitle">Create your password to access the parent portal.</p>

    <form method="POST">
        <div class="form-group">
            <label for="password">New Password</label>
            <input type="password" id="password" name="password" class="form-control" required>
        </div>

        <button type="submit" class="btn" style="width:100%;">Save Password</button>
    </form>
</div>
{% endblock %}
